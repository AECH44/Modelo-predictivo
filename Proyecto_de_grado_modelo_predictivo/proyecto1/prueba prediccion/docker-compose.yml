version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: saberpro_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saberpro_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d saberpro_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
